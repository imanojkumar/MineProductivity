name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "README.md"
      - "CHANGELOG.md"
      - "ROADMAP.md"
      - "CONTRIBUTING.md"
      - "CODE_OF_CONDUCT.md"
      - "SECURITY.md"
      - "src/mineproductivity/**"
      - "examples/**/README.md"
      - "benchmark/reports/**"
      - "scripts/docs/**"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "README.md"
      - "CHANGELOG.md"
      - "ROADMAP.md"
      - "CONTRIBUTING.md"
      - "CODE_OF_CONDUCT.md"
      - "SECURITY.md"
      - "src/mineproductivity/**"
      - "examples/**/README.md"
      - "benchmark/reports/**"
      - "scripts/docs/**"
      - ".github/workflows/docs.yml"
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build documentation site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      # The docs extra installs mkdocs-material + mkdocstrings; the editable
      # package install lets mkdocstrings import mineproductivity to render
      # the API reference from its docstrings (the base install is
      # dependency-free, so no extras are required for import).
      - run: pip install -e ".[docs]"

      # --strict fails the build on any broken internal link or warning.
      # Links that intentionally point at repository source files (outside
      # the docs tree) are rewritten to absolute GitHub URLs by the hook in
      # scripts/docs/link_rewrite_hook.py, so they neither break the site
      # nor trip --strict.
      - name: Build the documentation site (strict)
        run: mkdocs build --strict

      - name: Upload the built site as a workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: site/
          retention-days: 14

      - name: Upload the GitHub Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    name: Deploy to GitHub Pages
    # Only publish from main; pull requests build (above) but never deploy.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy the GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
