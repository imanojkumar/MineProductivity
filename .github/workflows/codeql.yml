name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Mondays 06:00 UTC -- catches newly-published CodeQL query
    # advisories against unchanged code, not just new commits.
    - cron: "0 6 * * 1"

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-and-quality

      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
