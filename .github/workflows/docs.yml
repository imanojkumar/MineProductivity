name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "README.md"
      - "src/mineproductivity/**/README.md"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "README.md"
      - "src/mineproductivity/**/README.md"

concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-docs:
    name: Build documentation site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - run: pip install -e ".[docs]"

      # Not --strict: docs/architecture/*.md (the locked design
      # specifications) intentionally cross-link to the root README.md
      # and to package READMEs under src/mineproductivity/, both of
      # which live outside mkdocs' own `docs_dir`. That is correct and
      # useful for GitHub's own file browser but unresolvable within a
      # single mkdocs site build; --strict would fail on those links
      # forever, for reasons unrelated to whether the site itself is
      # sound. A real build failure (bad mkdocs.yml, a missing plugin, a
      # genuinely malformed page) still fails this job because `mkdocs
      # build` itself exits non-zero.
      - name: Build the documentation site
        run: mkdocs build

      - name: Upload the built site
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: site/
          retention-days: 14
