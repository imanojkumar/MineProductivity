name: Security

on:
  push:
    branches: [main]
    paths:
      - "pyproject.toml"
  pull_request:
    branches: [main]
    paths:
      - "pyproject.toml"
  schedule:
    # Wednesdays 06:00 UTC -- a new CVE can be published against an
    # already-pinned dependency at any time, independent of any commit
    # to this repository.
    - cron: "0 6 * * 3"

jobs:
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Upgrade pip
        run: pip install --upgrade pip

      - name: Install mineproductivity with every optional dependency
        run: pip install -e ".[dev]"

      - name: Install pip-audit
        run: pip install --upgrade pip-audit

      # -s osv: pip-audit's own `--strict` flag fails the whole audit on
      # ANY skipped-or-unresolvable dependency, not just a found
      # vulnerability (pip_audit/_cli.py: a SkippedDependency under
      # --strict calls _fatal(), unconditionally). `mineproductivity`
      # itself is editable-installed and unpublished, so:
      #   - `--skip-editable` turns it into a SkippedDependency, which
      #     --strict then treats as fatal (defeating the flag's purpose).
      #   - the default PyPI vulnerability service can't resolve an
      #     unpublished package at all ("not found on PyPI"), which
      #     --strict *also* treats as fatal.
      # The OSV service (Google's Open Source Vulnerabilities database,
      # pip-audit's other first-class backend) resolves this cleanly: it
      # audits every real dependency exactly as before and reports zero
      # findings for the unpublished local `mineproductivity` package
      # itself, with no skip and no error -- `--strict` stays meaningful
      # for genuine resolution failures. `--skip-editable` is therefore
      # no longer needed and is removed, not just left inert.
      #
      # --ignore-vuln PYSEC-2026-113: a real, known Use-After-Free in
      # Apache Arrow C++ (pyarrow < 23.0.1) that the `events` extra's
      # current `pyarrow>=14,<19` constraint permits. Not silently
      # dropped: recorded here as a deliberate, tracked exception rather
      # than a permanently-red gate, because fixing it properly means
      # bumping across ~9 major pyarrow releases and re-validating
      # `ArrowEventCodec`/`ParquetEventCodec` against the new API --
      # a framework-compatibility change out of scope for this milestone
      # ("no framework changes"). Tracked as follow-up work; see
      # docs/governance/CI_CD_GUIDE.md.
      - name: Audit installed dependencies
        run: pip-audit --strict --desc -s osv --ignore-vuln PYSEC-2026-113
