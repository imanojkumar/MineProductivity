name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: benchmark-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  perf-smoke:
    name: Performance smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - run: pip install -e ".[analytics]"

      # A tripwire, not a benchmark: generous wall-clock ceilings meant
      # to catch a catastrophic regression (an accidental O(n^2), a
      # broken cache, a per-call re-import), not to track performance
      # over time. See scripts/quality/perf_smoke.py and
      # benchmark/README.md for the real (future) benchmark suite this
      # is deliberately not a substitute for.
      - run: python scripts/quality/perf_smoke.py
