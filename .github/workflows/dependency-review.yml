name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Scan dependency changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          # A patch release with a known CVE is a real, actionable risk;
          # a permissive-but-unusual license on a new dependency is worth
          # a human's attention before merge, not an automatic block.
          fail-on-severity: moderate
          comment-summary-in-pr: always
