name: Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[dev]"
      - name: ruff check
        run: ruff check .
      - name: ruff format --check
        run: ruff format --check .

  typecheck:
    name: Mypy (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[dev]"
      - run: mypy

  docs-validation:
    name: Documentation (links + snippets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[analytics]"
      - run: python scripts/quality/check_docs.py

  notebooks:
    name: Execute notebooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[dev]"
      - name: Register the execution kernel
        run: python -m ipykernel install --user --name ci-kernel
      - name: Execute every notebook
        run: |
          set -e
          shopt -s globstar nullglob
          notebooks=(notebooks/**/*.ipynb)
          if [ ${#notebooks[@]} -eq 0 ]; then
            echo "no notebooks found"
            exit 0
          fi
          for notebook in "${notebooks[@]}"; do
            echo "executing $notebook"
            # jupyter nbconvert --execute raises CellExecutionError (non-zero
            # exit) on the first cell that fails; combined with `set -e`
            # above, that's the only failure signal this job needs.
            jupyter nbconvert --to notebook --execute --inplace \
              --ExecutePreprocessor.kernel_name=ci-kernel \
              --ExecutePreprocessor.timeout=120 \
              "$notebook"
          done
