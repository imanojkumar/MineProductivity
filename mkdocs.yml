site_name: MineProductivity
site_description: An enterprise-grade, ontology-driven Python framework for mining productivity intelligence — KPIs, Digital Twins, simulation, optimization, AI decision support, and analytics.
site_author: Manoj Kumar
site_url: https://imanojkumar.github.io/MineProductivity/
repo_url: https://github.com/imanojkumar/MineProductivity
repo_name: imanojkumar/MineProductivity
copyright: Copyright &copy; 2026 Manoj Kumar - Apache-2.0

docs_dir: docs
site_dir: site

hooks:
  - scripts/docs/link_rewrite_hook.py

# Placeholders and GitHub-only source documents are kept in the repo but
# excluded from the built site (they have no site content, or link outside
# the docs tree). Their canonical content is reused elsewhere in the site.
exclude_docs: |
  /README.md
  api/README.md
  learning/LEARNING_PROGRESS.md
  developer_guide/
  reference_blueprint/
  learning_suite/
  /assets/README.md
  /images/README.md
  release_notes/
  architecture/locked_ssot_documents/
  **/why.txt

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  icon:
    repo: fontawesome/brands/github
  logo: assets/images/transparent_logo.png  
  favicon: assets/images/transparent_logo.png
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/imanojkumar/MineProductivity

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - include-markdown
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            docstring_style: numpy
            docstring_section_style: table
            show_root_heading: true
            show_root_full_path: false
            show_source: false
            show_bases: true
            separate_signature: true
            merge_init_into_class: true
            filters: ["!^_"]

