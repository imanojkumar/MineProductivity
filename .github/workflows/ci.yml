name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12", "3.13"]
        experimental: [false]
        include:
          # pyproject.toml declares `requires-python = ">=3.12"`. 3.10/3.11
          # are run for early signal only (on the fastest runner) and never
          # block merges -- raising the CI matrix above what the package
          # actually declares as supported would either be a silent no-op
          # or a permanently-red, meaningless gate.
          - os: ubuntu-latest
            python-version: "3.10"
            experimental: true
          - os: ubuntu-latest
            python-version: "3.11"
            experimental: true
    continue-on-error: ${{ matrix.experimental }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install mineproductivity[dev]
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest --cov=mineproductivity --cov-report=term-missing --cov-report=xml --cov-fail-under=95

      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tooling
        run: pip install build twine

      - name: Build distribution artifacts
        run: python -m build

      - name: twine check
        run: twine check --strict dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 14

  install-wheel:
    name: Install validation — wheel (${{ matrix.os }})
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install from wheel
        shell: bash
        run: pip install dist/*.whl

      - name: Smoke test
        run: python scripts/quality/smoke_test.py

  install-methods:
    name: Install validation — sdist / editable / GitHub
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install from sdist
        run: |
          python -m venv /tmp/venv-sdist
          /tmp/venv-sdist/bin/pip install dist/*.tar.gz
          /tmp/venv-sdist/bin/python scripts/quality/smoke_test.py

      - name: Install editable
        run: |
          python -m venv /tmp/venv-editable
          /tmp/venv-editable/bin/pip install -e .
          /tmp/venv-editable/bin/python scripts/quality/smoke_test.py

      - name: Install from GitHub at this commit
        env:
          COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          python -m venv /tmp/venv-github
          /tmp/venv-github/bin/pip install "git+https://github.com/${{ github.repository }}.git@${COMMIT_SHA}"
          /tmp/venv-github/bin/python scripts/quality/smoke_test.py
